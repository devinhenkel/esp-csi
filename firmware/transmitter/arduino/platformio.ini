; ESP-CSI Transmitter — PlatformIO config
; Run from firmware/transmitter/arduino/
;
; Flash:   pio run -e esp32 -t upload
; Monitor: pio device monitor
; Both:    pio run -e esp32 -t upload && pio device monitor

[platformio]
default_envs = esp32

[env]
framework = arduino
monitor_speed = 115200
; Override WiFi credentials here instead of editing main.cpp
; build_flags =
;     -DWIFI_SSID=\"your_ssid\"
;     -DWIFI_PASSWORD=\"your_password\"

; ── Board targets ─────────────────────────────────────────────────────────
[env:esp32]
platform = espressif32
board = esp32dev

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1

[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
