; ESP-CSI Receiver — PlatformIO config
; Run from firmware/receiver/arduino/
;
; Flash:   pio run -e esp32s3 -t upload
; Monitor: pio device monitor
; Both:    pio run -e esp32s3 -t upload && pio device monitor
;
; NOTE: CSI capture requires ESP32-S3 or ESP32-C6.
;       Standard ESP32 (esp32dev) has limited/no CSI API support.

[platformio]
default_envs = esp32s3

[env]
framework = arduino
monitor_speed = 115200
; Override WiFi credentials here instead of editing main.cpp
; build_flags =
;     -DWIFI_SSID=\"your_ssid\"
;     -DWIFI_PASSWORD=\"your_password\"

; ── Board targets ─────────────────────────────────────────────────────────
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
board_build.arduino.memory_type = qio_opi   ; use OPI PSRAM if available

[env:esp32c6]
platform = espressif32
board = esp32-c6-devkitc-1
